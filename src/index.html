<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'> 
  <script src="./js/main.js" defer></script>
  <title>Clima</title>
</head>
<body>
  
  <nav>
    <ul>
      <li><a href="index.html">Início</a></li>
      <li> <a href="">Sua estação</a></li>
      <li><a href="sobre.html">Sobre</a></li>
    </ul>
  </nav>


  <main>
    <section id="first">
      <p><b>O melhor lugar para a sua estação</b></p>
      <p>Nosso sistema de previsões garante a segurança máxima para seu negócio!</p>
    </section>

    <section id="second">
      <ul class="weatherTopInfos">
        <li>Previsão do tempo</li>
        <li>Localização</li>
        <li><input type="text" placeholder="Buscar cidade"></li>
      </ul>

      <div class="weatherInfos">
        <aside class="left">
          <div class="imgContainer">
            <img src="./assets/imgs/clouds_bg.jpg" alt="">
            <h1 class="mainTemperature">99 °C</h1>
            <h1 class="mainClock">01:34</h1>
          </div>
        
          <ul class="weatherSpecs">
            <li> <i class='bx bx-wind' ></i> Vento <br><span></span></li>
            <li> <i class='bx bx-droplet'></i> Umidade<br><span></span></bre></li>
            <li> <i class='bx bx-show-alt' ></i> Visualização<br><span></span></li>
            <li> <i class='bx bxl-tailwind-css' ></i> Pressão<br><span></span></li>
            <li> <i class='bx bx-sun' ></i> S. Térmica<br><span></span></li>
            <li> <i class='bx bxs-droplet' ></i> T. Máxima<br><span></span></li>
          </ul>
        </aside>
        <aside class="right">
          
        </aside>
      </div>

    </section>
  </main>
</body>
</html>
